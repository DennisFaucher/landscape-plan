<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Landscape Planner{% endblock %}</title>
  <link href="/static/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-forest">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-tree-fill me-2"></i>Landscape Planner
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.url.path.startswith('/plants') %}active{% endif %}" href="/plants">
            <i class="bi bi-flower2 me-1"></i>Plant Database
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path.startswith('/canvas') %}active{% endif %}" href="/canvas">
            <i class="bi bi-grid-1x2 me-1"></i>Canvas Design
          </a>
        </li>
      </ul>
      <span class="text-white-50 small me-2">
        <i class="bi bi-person-circle me-1"></i>{{ request.state.username }}
      </span>
      <a class="btn btn-outline-light btn-sm" href="/logout">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </a>
    </div>
  </div>
</nav>

<main class="{% block main_class %}container py-4{% endblock %}">
  {% block content %}{% endblock %}
</main>

<script src="/static/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>

{% extends "base.html" %}
{% block title %}Add Plant{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="/plants" class="btn btn-outline-secondary btn-sm me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h2 class="mb-0 text-forest"><i class="bi bi-cloud-upload me-2"></i>Add Plant via Photo</h2>
</div>

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header bg-forest-light fw-semibold">
        <i class="bi bi-laptop me-2"></i>Upload from Computer
      </div>
      <div class="card-body">
        <form method="post" action="/plants/upload" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label">Choose a plant photo</label>
            <input type="file" name="file" id="fileInput" class="form-control"
                   accept="image/*" required>
          </div>
          <div id="preview-wrap" class="mb-3 d-none">
            <img id="preview" src="" class="img-thumbnail" style="max-height:220px">
          </div>
          <button type="submit" class="btn btn-forest w-100">
            <i class="bi bi-upload me-1"></i>Upload &amp; Crop
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('fileInput').addEventListener('change', function () {
  const file = this.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('preview').src = e.target.result;
      document.getElementById('preview-wrap').classList.remove('d-none');
    };
    reader.readAsDataURL(file);
  }
});
</script>
{% endblock %}

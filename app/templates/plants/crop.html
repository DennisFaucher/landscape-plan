{% extends "base.html" %}
{% block title %}Crop Image{% endblock %}
{% block head %}
<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" rel="stylesheet">
<style>
  .crop-container { max-height: 500px; }
  .crop-container img { max-width: 100%; display: block; }
</style>
{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="/plants/upload" class="btn btn-outline-secondary btn-sm me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h2 class="mb-0 text-forest"><i class="bi bi-crop me-2"></i>Crop Image</h2>
</div>

<div class="card">
  <div class="card-body">
    <p class="text-muted small mb-3">Adjust the crop selection to focus on the plant, then click <strong>Proceed to Identify</strong>.</p>
    <div class="crop-container mb-3">
      <img id="cropTarget" src="{{ temp_url }}" alt="Crop target">
    </div>
    <div class="d-flex gap-2">
      <button id="btnCrop" class="btn btn-forest">
        <i class="bi bi-check-circle me-1"></i>Proceed to Identify
      </button>
      <a href="/plants/identify/{{ temp_id }}" class="btn btn-outline-secondary">
        <i class="bi bi-skip-forward me-1"></i>Skip Crop
      </a>
    </div>
  </div>
</div>

<form id="cropForm" method="post" action="/plants/crop/{{ temp_id }}">
  <input type="hidden" name="x" id="cropX">
  <input type="hidden" name="y" id="cropY">
  <input type="hidden" name="width" id="cropW">
  <input type="hidden" name="height" id="cropH">
</form>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script>
const cropper = new Cropper(document.getElementById('cropTarget'), {
  viewMode: 1,
  dragMode: 'move',
  aspectRatio: NaN,
  autoCropArea: 0.8,
  responsive: true,
});

document.getElementById('btnCrop').addEventListener('click', () => {
  const data = cropper.getData(true);
  document.getElementById('cropX').value = data.x;
  document.getElementById('cropY').value = data.y;
  document.getElementById('cropW').value = data.width;
  document.getElementById('cropH').value = data.height;
  document.getElementById('cropForm').submit();
});
</script>
{% endblock %}
